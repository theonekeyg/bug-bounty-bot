<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>Bug Bounty Agent</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --border: #2a2a2a;
        --text: #e0e0e0;
        --muted: #666;
        --accent: #7c3aed;
        --accent-hover: #6d28d9;
        --green: #22c55e;
        --yellow: #eab308;
        --red: #ef4444;
        --blue: #3b82f6;
        --radius: 8px;
        --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Title bar drag region ── */
      .titlebar {
        height: 38px;
        -webkit-app-region: drag;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 80px 0 16px;
        flex-shrink: 0;
      }
      .titlebar h1 { font-size: 13px; font-weight: 500; color: var(--muted); }

      /* ── Layout ── */
      .layout { display: flex; flex: 1; overflow: hidden; }
      .sidebar { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
      .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

      /* ── Sections ── */
      .section { padding: 16px; }
      .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }

      /* ── Brief form ── */
      #brief-form { border-bottom: 1px solid var(--border); }

      .field { margin-bottom: 12px; }
      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }

      input[type="text"], textarea {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: inherit;
        font-size: 13px;
        padding: 8px 10px;
        outline: none;
        resize: vertical;
      }
      input[type="text"]:focus, textarea:focus { border-color: var(--accent); }

      .file-picker { display: flex; gap: 8px; }
      .file-picker input { flex: 1; font-family: var(--font-mono); font-size: 11px; }

      button {
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        padding: 8px 14px;
        transition: background 0.1s;
      }
      .btn-primary { background: var(--accent); color: white; width: 100%; padding: 10px; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
      .btn-sm { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 6px 10px; font-size: 12px; }
      .btn-sm:hover { border-color: var(--accent); }

      /* ── Track list ── */
      #track-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
      .track-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; cursor: pointer; }
      .track-card:hover { border-color: var(--accent); }
      .track-card.active { border-color: var(--accent); }
      .track-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
      .track-id { font-family: var(--font-mono); font-size: 11px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .status-dot.running { background: var(--blue); animation: pulse 1.5s infinite; }
      .status-dot.found { background: var(--green); }
      .status-dot.disproven { background: var(--muted); }
      .status-dot.blocked { background: var(--yellow); }
      .status-dot.awaiting_permission { background: var(--red); animation: pulse 0.8s infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      .track-hypo { font-size: 12px; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

      /* ── Main content ── */
      #welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 8px; }
      #welcome h2 { font-size: 20px; color: var(--text); }
      #welcome p { font-size: 14px; }

      #progress-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
      .progress-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
      .progress-header h2 { font-size: 15px; font-weight: 600; }
      #progress-log { flex: 1; overflow-y: auto; padding: 16px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; white-space: pre-wrap; color: var(--text); }

      /* ── Permission prompt ── */
      #permission-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
      #permission-overlay.hidden { display: none; }
      .permission-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 480px; width: 100%; }
      .permission-card h3 { font-size: 16px; margin-bottom: 8px; }
      .permission-card p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
      .permission-cmd { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-family: var(--font-mono); font-size: 12px; margin-bottom: 16px; }
      .permission-actions { display: flex; gap: 8px; justify-content: flex-end; }
      .btn-approve { background: var(--green); color: #000; }
      .btn-approve:hover { filter: brightness(1.1); }
      .btn-deny { background: var(--red); color: white; }
      .btn-deny:hover { filter: brightness(1.1); }
    </style>
  </head>
  <body>
    <div class="titlebar"><h1>Bug Bounty Agent</h1></div>

    <div class="layout">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="section" id="brief-form">
          <div class="section-title">New Research</div>

          <div class="field">
            <label>Target</label>
            <input type="text" id="target" placeholder="e.g. Acme Corp API" />
          </div>
          <div class="field">
            <label>Goal</label>
            <input type="text" id="goal" placeholder="e.g. Find auth bypass in /api/v2" />
          </div>
          <div class="field">
            <label>Scope</label>
            <textarea id="scope" rows="2" placeholder="In scope: api.acme.com&#10;Out of scope: billing endpoints"></textarea>
          </div>
          <div class="field">
            <label>Code path (optional)</label>
            <div class="file-picker">
              <input type="text" id="code-path" placeholder="/path/to/repo" readonly />
              <button class="btn-sm" id="pick-code">Browse</button>
            </div>
          </div>
          <div class="field">
            <label>Links (comma-separated)</label>
            <input type="text" id="links" placeholder="https://github.com/..." />
          </div>
          <div class="field">
            <label>Context</label>
            <textarea id="context" rows="2" placeholder="Node.js backend, JWT auth, PostgreSQL..."></textarea>
          </div>
          <div class="field">
            <label>Boxer URL</label>
            <input type="text" id="boxer-url" value="http://localhost:8080" />
          </div>

          <button class="btn-primary" id="start-btn">Start Research</button>
        </div>

        <div id="track-list">
          <div class="section-title" style="padding: 12px 0 8px;">Research Tracks</div>
          <div id="tracks-container"><p style="font-size:12px;color:var(--muted)">No active session</p></div>
        </div>
      </div>

      <!-- Main -->
      <div class="main">
        <div id="welcome">
          <h2>Bug Bounty Agent</h2>
          <p>Fill in the brief and click Start Research to begin.</p>
        </div>
        <div id="progress-view" style="display:none">
          <div class="progress-header">
            <div class="status-dot running" id="active-status-dot"></div>
            <h2 id="active-track-title">—</h2>
          </div>
          <div id="progress-log"></div>
        </div>
      </div>
    </div>

    <!-- Permission overlay -->
    <div id="permission-overlay" class="hidden">
      <div class="permission-card">
        <h3>Tool Installation Request</h3>
        <p id="perm-justification"></p>
        <div class="permission-cmd" id="perm-command"></div>
        <div class="permission-actions">
          <button class="btn-sm btn-deny" id="perm-deny">Deny</button>
          <button class="btn-sm btn-approve" id="perm-approve">Approve</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
